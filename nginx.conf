worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        application live {
            live on;
            record off;
            
            # Allow publishing from anywhere
            allow publish all;
            
            # Allow playing from anywhere
            allow play all;

            # HLS output
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2;
            hls_playlist_length 10;
        }
    }
}

http {
    server {
        listen 8888;
        
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xml {
            rtmp_stat all;
        }

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
        
        location / {
            root /usr/local/nginx/html;
        }
    }
}
