<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VxD Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    @font-face{font-family:'MVWaheed';src:url('fonts/MVWaheed.otf') format('opentype')}
    @font-face{font-family:'MvEamaan';src:url('fonts/Mv_Eamaan_XP.otf') format('opentype')}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#09090b;color:#e4e4e7;min-height:100vh;-webkit-tap-highlight-color:transparent}
    :root{--bg:#09090b;--card:#18181b;--card2:#1f1f23;--bdr:#27272a;--bdr2:#3f3f46;--t1:#fafafa;--t2:#a1a1aa;--t3:#71717a;--red:#ef4444;--grn:#22c55e;--blu:#3b82f6;--amb:#f59e0b;--radius:8px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

    .shell{display:grid;grid-template-columns:1fr;min-height:100vh}
    @media(min-width:1024px){
      .shell{grid-template-columns:380px 1fr;grid-template-rows:auto 1fr}
      .topbar{grid-column:1/-1}
      .sidebar{border-right:1px solid var(--bdr);overflow-y:auto;padding:20px}
      .main{overflow-y:auto;padding:20px 24px}
    }
    @media(max-width:1023px){.sidebar,.main{padding:12px 16px}}

    .topbar{background:var(--card);border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
    .topbar-left{display:flex;align-items:center;gap:16px}
    .logo{font-size:22px;font-weight:900;letter-spacing:-1px}
    .logo-v{color:var(--red)}.logo-x{color:var(--amb)}.logo-d{color:var(--grn)}
    .topbar-nav{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px}
    .topbar-nav a{padding:6px 16px;border-radius:4px;font-size:12px;font-weight:600;text-decoration:none;color:var(--t3);transition:all .15s}
    .topbar-nav a.act{background:var(--card2);color:var(--t1)}
    .topbar-nav a:hover:not(.act){color:var(--t2)}
    .topbar-right{display:flex;align-items:center;gap:12px}
    .conn-status{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
    .conn-status.on{background:#22c55e12;color:var(--grn);border:1px solid #22c55e25}
    .conn-status.off{background:#ef444412;color:var(--red);border:1px solid #ef444425}
    .conn-dot{width:6px;height:6px;border-radius:50%}
    .conn-status.on .conn-dot{background:var(--grn);box-shadow:0 0 6px var(--grn)}
    .conn-status.off .conn-dot{background:var(--red)}
    .gear{background:var(--card2);border:1px solid var(--bdr);border-radius:6px;padding:6px 10px;color:var(--t3);font-size:14px;cursor:pointer;transition:all .15s;text-decoration:none}
    .gear:hover{background:var(--bdr);color:var(--t1)}
    .topbar-logos{display:flex;align-items:center;gap:8px}

    /* Quick actions */
    .quick-bar{display:flex;gap:6px;margin-bottom:20px}
    .q-btn{flex:1;border:none;border-radius:var(--radius);padding:14px 8px;font-size:13px;font-weight:800;cursor:pointer;color:#fff;font-family:inherit;letter-spacing:.5px;transition:all .15s}
    .q-btn:hover{opacity:.85}
    .q-btn.c{background:var(--red)}.q-btn.f{background:var(--blu)}.q-btn.t{background:var(--bdr2)}.q-btn.s{background:#dc2626;font-size:11px}

    /* Section */
    .sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .sec-title{color:var(--t3);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}

    /* Ticker panel */
    .tk-panel{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:20px}
    .tk-tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--bg);border-radius:8px;padding:3px}
    .tk-tab{flex:1;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;color:var(--t3);background:transparent;font-family:inherit;transition:all .15s}
    .tk-tab.act{background:var(--card2);color:var(--t1)}
    .tk-tab:hover:not(.act){color:var(--t2)}

    .tk-preview{background:#111;border-radius:8px;overflow:hidden;margin-bottom:14px;position:relative;height:80px;display:flex;align-items:flex-end}
    .tk-preview-stripe{height:4px;position:absolute;top:0;left:0;right:0}
    .tk-preview-bar{width:100%;height:52px;display:flex;align-items:center}
    .tk-preview-label{color:#fff;font-family:'MVWaheed',sans-serif;font-size:16px;padding:0 14px;height:100%;display:flex;align-items:center;white-space:nowrap;min-width:90px;justify-content:center}
    .tk-preview-body{flex:1;height:100%;display:flex;align-items:center;padding:0 14px;overflow:hidden;background:#1a1a2e}
    .tk-preview-text{color:#fff;font-family:'MvEamaan',sans-serif;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl}
    .tk-preview-off{color:#444;font-size:11px;font-family:inherit}
    .tk-preview.rtl .tk-preview-bar{direction:rtl}
    .tk-preview.rtl .tk-preview-body{border-left:3px solid var(--amb)}
    .tk-preview.ltr .tk-preview-bar{direction:ltr}
    .tk-preview.ltr .tk-preview-body{border-right:3px solid var(--amb)}
    .tk-preview.ltr .tk-preview-text{direction:ltr;font-family:'Inter',sans-serif}
    .tk-preview.ltr .tk-preview-label{font-family:'Inter',sans-serif;font-weight:800;font-size:13px}

    .tk-row{display:flex;gap:6px;margin-bottom:10px}
    .tk-row:last-child{margin-bottom:0}
    .tk-label-text{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:4px}
    .tk-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--t1);font-size:14px;font-family:'MVWaheed','MvEamaan','Inter',sans-serif;outline:none;direction:auto}
    .tk-input:focus{border-color:var(--bdr2)}
    .tk-input::placeholder{color:var(--t3);font-family:'MvEamaan','Inter',sans-serif;font-size:13px}
    .tk-textarea{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--t1);font-size:18px;font-family:'MvEamaan','Inter',sans-serif;outline:none;resize:none;line-height:1.5;direction:auto;min-height:80px}
    .tk-textarea:focus{border-color:var(--bdr2)}
    .tk-textarea::placeholder{color:var(--t3);font-size:14px}
    .tk-select{padding:8px 10px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--t1);font-size:12px;font-family:inherit;outline:none;cursor:pointer;flex:1}
    .tk-colors{display:flex;gap:4px;margin-bottom:10px}
    .tk-color{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s}
    .tk-color.act{border-color:#fff;transform:scale(1.15)}
    .tk-color:hover{transform:scale(1.1)}
    .tk-actions{display:flex;gap:6px}
    .tk-btn{flex:1;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;transition:all .15s;letter-spacing:.3px}
    .tk-btn:hover{opacity:.85}
    .tk-btn.show{background:var(--grn)}
    .tk-btn.hide{background:var(--red)}
    .tk-btn.both-show{background:var(--blu)}
    .tk-btn.both-hide{background:#52525b}

    /* Feed grid */
    .feeds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    @media(max-width:1023px){.feeds-grid{grid-template-columns:1fr 1fr}}
    .feed-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius);overflow:hidden;animation:fadeIn .3s ease;transition:all .2s}
    .feed-card.live{border-color:#22c55e25;background:linear-gradient(180deg,#0a1a14 0%,var(--card) 100%)}
    .feed-header{padding:6px 10px;display:flex;justify-content:space-between;align-items:center}
    .feed-left{display:flex;align-items:center;gap:6px}
    .stream-dot{width:6px;height:6px;border-radius:50%}
    .stream-dot.on{background:var(--grn);box-shadow:0 0 6px var(--grn)}.stream-dot.off{background:var(--bdr2)}
    .feed-name{font-size:12px;font-weight:700}
    .feed-key{font-size:9px;color:var(--t3);margin-left:2px}
    .feed-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:1.5px}
    .feed-badge.live{background:#22c55e12;border:1px solid #22c55e30;color:var(--grn);animation:pulse 2s infinite}
    .feed-badge.off{background:var(--card2);color:var(--t3)}
    .feed-video{background:#000;width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center}
    .feed-video video{width:100%;height:100%;object-fit:contain;background:#000}
    .feed-offline{color:#333;font-size:10px;font-weight:500}
    .feed-urls{padding:6px 10px;display:flex;flex-direction:column;gap:4px}
    .feed-url-row{display:flex;flex-direction:column;gap:1px}
    .feed-url-label{font-size:8px;color:var(--t3);font-weight:600;letter-spacing:.5px}
    .feed-url-box{display:flex;align-items:center;gap:3px;background:var(--bg);border-radius:4px;padding:4px 6px;border:1px solid var(--bdr)}
    .feed-url-text{flex:1;font-size:9px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',SFMono-Regular,ui-monospace,monospace}
    .copy-btn{background:var(--card2);color:var(--t2);border:1px solid var(--bdr);border-radius:3px;padding:2px 6px;font-size:8px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
    .copy-btn:hover{background:var(--bdr);color:var(--t1)}
    .copy-btn.ok{background:var(--grn);color:#fff;border-color:var(--grn)}

    /* Field Reporters */
    .fr-panel{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:16px;margin-bottom:20px}
    .fr-desc{font-size:11px;color:var(--t3);line-height:1.5;margin-bottom:12px}
    .fr-slots{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .fr-slot{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px}
    .fr-slot-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .fr-slot-name{font-size:13px;font-weight:700;color:var(--t1)}
    .fr-slot-rm{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 6px}
    .fr-slot-rm:hover{color:var(--red)}
    .fr-urls{display:flex;flex-direction:column;gap:6px}
    .fr-url-row{display:flex;flex-direction:column;gap:2px}
    .fr-url-label{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.5px}
    .fr-url-box{display:flex;align-items:center;gap:4px;background:var(--card);border-radius:5px;padding:5px 8px;border:1px solid var(--bdr)}
    .fr-url-text{flex:1;font-size:10px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',SFMono-Regular,ui-monospace,monospace}
    .fr-copy{background:var(--card2);color:var(--t2);border:1px solid var(--bdr);border-radius:3px;padding:2px 8px;font-size:9px;font-weight:600;cursor:pointer;font-family:inherit}
    .fr-copy:hover{background:var(--bdr);color:var(--t1)}
    .fr-copy.ok{background:var(--grn);color:#fff;border-color:var(--grn)}
    .fr-share{background:var(--blu);color:#fff;border:none;border-radius:3px;padding:2px 8px;font-size:9px;font-weight:600;cursor:pointer;font-family:inherit}
    .fr-share:hover{opacity:.85}
    .fr-add{display:flex;gap:6px}
    .fr-input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:8px;color:var(--t1);font-size:12px;font-family:inherit;outline:none}
    .fr-input:focus{border-color:var(--bdr2)}
    .fr-input::placeholder{color:var(--t3)}
    .fr-btn{background:var(--blu);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
    .fr-btn:hover{opacity:.85}
    .footer{padding:12px 0;border-top:1px solid var(--bdr);text-align:center;margin-top:16px}
    .footer-text{color:var(--bdr2);font-size:10px}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo"><span class="logo-v">V</span><span class="logo-x">x</span><span class="logo-d">D</span></div>
      </div>
      <div class="topbar-right">
        <div id="connStatus" class="conn-status off"><span class="conn-dot"></span>OFFLINE</div>
        <div class="topbar-logos">
          <img src="img/voice.png" alt="VOICE" style="height:28px;object-fit:contain">
          <span style="color:#555;font-size:12px;font-weight:300">✕</span>
          <img src="img/dhuvas.png" alt="DHUVAS" style="height:28px;object-fit:contain">
        </div>
      </div>
    </div>

    <div class="sidebar">

      <div class="quick-bar">
        <button class="q-btn c" onclick="cmd('Cut')">CUT</button>
        <button class="q-btn f" onclick="cmd('Fade','Duration=500')">FADE</button>
        <button class="q-btn t" onclick="cmd('FadeToBlack')">FTB</button>
        <button class="q-btn s" onclick="if(confirm('End all streams?'))cmd('StopStreaming')">END ALL</button>
      </div>

      <div class="sec-hdr"><span class="sec-title">Live Ticker</span></div>
      <div class="tk-panel">
        <div class="tk-tabs">
          <button class="tk-tab act" id="tabVoice" onclick="switchTab('voice')">VOICE</button>
          <button class="tk-tab" id="tabDhuvas" onclick="switchTab('dhuvas')">DHUVAS</button>
        </div>

        <div class="tk-preview rtl" id="tkPreview">
          <div class="tk-preview-stripe" id="tkPStripe" style="background:linear-gradient(90deg,#ef4444 30%,#f59e0b 100%)"></div>
          <div class="tk-preview-bar">
            <div class="tk-preview-label" id="tkPLabel" style="background:#ef4444">ބްރޭކިންގ</div>
            <div class="tk-preview-body">
              <span class="tk-preview-text" id="tkPText"><span class="tk-preview-off">Preview will appear here</span></span>
            </div>
          </div>
        </div>

        <div style="margin-bottom:10px">
          <div class="tk-label-text">DIRECTION</div>
          <div class="tk-row">
            <button class="tk-tab act" id="dirRtl" onclick="setDir('rtl')" style="flex:1;font-family:'MvEamaan',sans-serif">ދިވެހި</button>
            <button class="tk-tab" id="dirLtr" onclick="setDir('ltr')" style="flex:1">English</button>
          </div>
        </div>

        <div style="margin-bottom:10px">
          <div class="tk-label-text">LABEL (MVWaheed)</div>
          <input type="text" id="tkLabel" class="tk-input" placeholder="ބްރޭކިންގ" dir="auto" oninput="livePreview()">
        </div>

        <div style="margin-bottom:10px">
          <div class="tk-label-text">TICKER TEXT (MvEamaan)</div>
          <textarea id="tkText" class="tk-textarea" placeholder="ޓިކަރ ޓެކްސްޓް ލިޔުއްވާ..." dir="auto" rows="3" oninput="livePreview()"></textarea>
        </div>

        <div style="margin-bottom:10px">
          <div class="tk-label-text">COLOR</div>
          <div class="tk-colors">
            <div class="tk-color act" style="background:#ef4444" onclick="setColor('#ef4444',this)"></div>
            <div class="tk-color" style="background:#3b82f6" onclick="setColor('#3b82f6',this)"></div>
            <div class="tk-color" style="background:#22c55e" onclick="setColor('#22c55e',this)"></div>
            <div class="tk-color" style="background:#f59e0b" onclick="setColor('#f59e0b',this)"></div>
            <div class="tk-color" style="background:#8b5cf6" onclick="setColor('#8b5cf6',this)"></div>
            <div class="tk-color" style="background:#06b6d4" onclick="setColor('#06b6d4',this)"></div>
            <div class="tk-color" style="background:#ec4899" onclick="setColor('#ec4899',this)"></div>
            <div class="tk-color" style="background:#ffffff" onclick="setColor('#ffffff',this)"></div>
          </div>
        </div>

        <div class="tk-row" style="margin-bottom:12px">
          <div style="flex:1">
            <div class="tk-label-text">MODE</div>
            <select id="tkMode" class="tk-select" onchange="livePreview()">
              <option value="scroll">Scroll</option>
              <option value="static">Static</option>
            </select>
          </div>
          <div style="flex:1">
            <div class="tk-label-text">SPEED</div>
            <select id="tkSpeed" class="tk-select">
              <option value="8">Very Slow</option>
              <option value="12">Slow</option>
              <option value="15" selected>Normal</option>
              <option value="20">Fast</option>
              <option value="30">Very Fast</option>
            </select>
          </div>
        </div>

        <div class="tk-actions">
          <button class="tk-btn show" onclick="showTicker()">SHOW</button>
          <button class="tk-btn hide" onclick="hideTicker()">HIDE</button>
        </div>
        <div class="tk-actions" style="margin-top:6px">
          <button class="tk-btn both-show" onclick="showBothTickers()">BOTH SHOW</button>
          <button class="tk-btn both-hide" onclick="hideBothTickers()">BOTH HIDE</button>
        </div>
      </div>

      <div class="sec-hdr"><span class="sec-title">Field Reporters (WebRTC)</span></div>
      <div class="fr-panel">
        <div class="fr-desc">Send a link to anyone — they open it, tap Go Live, and their camera appears here and in vMix. No app needed.</div>
        <div class="fr-slots" id="frSlots"></div>
        <div class="fr-add">
          <input type="text" id="frName" class="fr-input" placeholder="Reporter name (e.g. Ahmed - Addu)">
          <button class="fr-btn" onclick="addReporter()">+ Add Reporter</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="sec-hdr"><span class="sec-title">Live Feeds</span></div>
      <div id="reporterFeeds" class="feeds-grid" style="margin-bottom:12px"></div>
      <div id="feedList" class="feeds-grid"></div>
      <div class="footer"><span class="footer-text" id="fTxt">VxD Broadcast Control</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script>
    const RTMP_HOST='acela.proxy.rlwy.net:15678';
    const HLS_HOST=window.location.origin;
    const FEEDS=[
      {key:'liveu',name:'LiveU'},
      {key:'yolo',name:'Yolo'}
    ];
    let poll=null,feedPoll=null;
    let hlsPlayers={};
    let liveFeeds={};
    let s={connected:false};
    let activeTab='voice';
    let tkDir='rtl';
    let tkColor='#ef4444';

    checkUrl();

    function checkUrl(){
      startPolling();
      pollFeeds();
      feedPoll=setInterval(pollFeeds,5000);
    }

    function startPolling(){pollStatus();poll=setInterval(pollStatus,3000);}

    async function cmd(f,p=''){try{await fetch(`/api/vmix-cmd?Function=${f}${p?'&'+p:''}`);setTimeout(pollStatus,500);}catch(e){}}

    async function pollStatus(){
      try{
        const r=await fetch('/api/vmix');if(!r.ok)throw 0;
        s.connected=true;render();
      }catch(e){s.connected=false;render();}
    }

    function render(){
      const cs=document.getElementById('connStatus');
      cs.className='conn-status '+(s.connected?'on':'off');
      cs.innerHTML='<span class="conn-dot"></span>'+(s.connected?'CONNECTED':'OFFLINE');
      document.getElementById('fTxt').textContent='VxD Control • '+new Date().toLocaleTimeString();
    }

    // === TICKER ===
    function switchTab(tab){
      activeTab=tab;
      document.getElementById('tabVoice').className='tk-tab'+(tab==='voice'?' act':'');
      document.getElementById('tabDhuvas').className='tk-tab'+(tab==='dhuvas'?' act':'');
      loadTicker(tab);
    }

    async function loadTicker(id){
      try{
        const r=await fetch('/api/ticker/'+id);
        const d=await r.json();
        document.getElementById('tkLabel').value=(d.label==='ބްރޭކިންގ')?'':d.label;
        document.getElementById('tkText').value=d.text||'';
        document.getElementById('tkMode').value=d.mode||'scroll';
        document.getElementById('tkSpeed').value=d.speed||15;
        tkDir=d.direction||'rtl';
        tkColor=d.labelColor||'#ef4444';
        document.getElementById('dirRtl').className='tk-tab'+(tkDir==='rtl'?' act':'');
        document.getElementById('dirLtr').className='tk-tab'+(tkDir==='ltr'?' act':'');
        document.querySelectorAll('.tk-color').forEach(c=>{c.className='tk-color'+(c.style.background===tkColor?' act':'');});
        livePreview();
      }catch(e){}
    }

    function setDir(d){
      tkDir=d;
      document.getElementById('dirRtl').className='tk-tab'+(d==='rtl'?' act':'');
      document.getElementById('dirLtr').className='tk-tab'+(d==='ltr'?' act':'');
      livePreview();
    }

    function setColor(c,el){
      tkColor=c;
      document.querySelectorAll('.tk-color').forEach(e=>e.className='tk-color');
      if(el)el.className='tk-color act';
      livePreview();
    }

    function livePreview(){
      const label=document.getElementById('tkLabel').value||'ބްރޭކިންގ';
      const text=document.getElementById('tkText').value;
      const prev=document.getElementById('tkPreview');
      const pLabel=document.getElementById('tkPLabel');
      const pText=document.getElementById('tkPText');
      const pStripe=document.getElementById('tkPStripe');

      prev.className='tk-preview '+(tkDir==='ltr'?'ltr':'rtl');
      pLabel.textContent=label;
      pLabel.style.background=tkColor;
      pText.innerHTML=text||'<span class="tk-preview-off">Preview will appear here</span>';
      if(tkDir==='ltr'){
        pStripe.style.background=`linear-gradient(270deg,${tkColor} 30%,#f59e0b 100%)`;
      }else{
        pStripe.style.background=`linear-gradient(90deg,${tkColor} 30%,#f59e0b 100%)`;
      }
    }

    function getTickerData(){
      return {
        label:document.getElementById('tkLabel').value||'ބްރޭކިންގ',
        text:document.getElementById('tkText').value,
        mode:document.getElementById('tkMode').value,
        speed:parseInt(document.getElementById('tkSpeed').value),
        direction:tkDir,
        labelColor:tkColor
      };
    }

    async function showTicker(){
      const data=getTickerData();data.visible=true;
      await fetch('/api/ticker/'+activeTab,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    }
    async function hideTicker(){
      await fetch('/api/ticker/'+activeTab,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({visible:false})});
    }
    async function showBothTickers(){
      const data=getTickerData();data.visible=true;
      await Promise.all([
        fetch('/api/ticker/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}),
        fetch('/api/ticker/dhuvas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
      ]);
    }
    async function hideBothTickers(){
      const h={visible:false};
      await Promise.all([
        fetch('/api/ticker/voice',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(h)}),
        fetch('/api/ticker/dhuvas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(h)})
      ]);
    }

    loadTicker('voice');

    // === FEEDS ===
    let feedFailCount={};
    let feedsRendered=false;

    async function pollFeeds(){
      const newLive={};
      await Promise.all(FEEDS.map(async f=>{
        try{
          const r=await fetch(`/hls/${f.key}.m3u8`,{cache:'no-store'});
          if(r.ok){const t=await r.text();if(t.includes('.ts')){newLive[f.key]=true;feedFailCount[f.key]=0;}}
        }catch(e){}
        if(!newLive[f.key]&&liveFeeds[f.key]){
          feedFailCount[f.key]=(feedFailCount[f.key]||0)+1;
          if(feedFailCount[f.key]<3)newLive[f.key]=true;
        }
      }));
      const oldLive=liveFeeds;liveFeeds=newLive;
      if(!feedsRendered){renderFeeds();feedsRendered=true;}
      else{updateFeedStatus(oldLive);}
    }

    function renderFeeds(){
      document.getElementById('feedList').innerHTML=FEEDS.map(f=>{
        const isLive=!!liveFeeds[f.key];
        const rtmpUrl=`rtmp://${RTMP_HOST}/live/${f.key}`;
        const hlsUrl=`${HLS_HOST}/hls/${f.key}.m3u8`;
        return `<div class="feed-card ${isLive?'live':''}" id="card-${f.key}"><div class="feed-header"><div class="feed-left"><span class="stream-dot ${isLive?'on':'off'}" id="dot-${f.key}"></span><span class="feed-name">${f.name}</span><span class="feed-key">/${f.key}</span></div><span class="feed-badge ${isLive?'live':'off'}" id="badge-${f.key}">${isLive?'● LIVE':'OFFLINE'}</span></div><div class="feed-video" id="preview-${f.key}"><video id="vid-${f.key}" muted autoplay playsinline style="display:${isLive?'block':'none'}"></video><span class="feed-offline" id="offline-${f.key}" style="display:${isLive?'none':'block'}">No feed</span></div><div class="feed-urls"><div class="feed-url-row"><span class="feed-url-label">RTMP PUSH</span><div class="feed-url-box"><span class="feed-url-text">${rtmpUrl}</span><button class="copy-btn" onclick="copyUrl(this,'${rtmpUrl}')">Copy</button></div></div><div class="feed-url-row"><span class="feed-url-label">vMix PULL</span><div class="feed-url-box"><span class="feed-url-text">${hlsUrl}</span><button class="copy-btn" onclick="copyUrl(this,'${hlsUrl}')">Copy</button></div></div></div></div>`;
      }).join('');
      attachPlayers();
    }

    function updateFeedStatus(oldLive){
      FEEDS.forEach(f=>{
        const isLive=!!liveFeeds[f.key],wasLive=!!oldLive[f.key];
        const card=document.getElementById('card-'+f.key),dot=document.getElementById('dot-'+f.key),badge=document.getElementById('badge-'+f.key),vid=document.getElementById('vid-'+f.key),offline=document.getElementById('offline-'+f.key);
        if(card)card.className='feed-card '+(isLive?'live':'');
        if(dot)dot.className='stream-dot '+(isLive?'on':'off');
        if(badge){badge.className='feed-badge '+(isLive?'live':'off');badge.textContent=isLive?'● LIVE':'OFFLINE';}
        if(isLive&&!wasLive){if(vid)vid.style.display='block';if(offline)offline.style.display='none';attachPlayer(f.key);}
        else if(!isLive&&wasLive){if(vid)vid.style.display='none';if(offline)offline.style.display='block';if(hlsPlayers[f.key]){hlsPlayers[f.key].destroy();delete hlsPlayers[f.key];}}
      });
    }

    function attachPlayers(){FEEDS.forEach(f=>{if(liveFeeds[f.key])attachPlayer(f.key);});}

    function attachPlayer(key){
      const vid=document.getElementById('vid-'+key);
      if(!vid||hlsPlayers[key])return;
      const hlsUrl=`${HLS_HOST}/hls/${key}.m3u8`;
      if(Hls.isSupported()){
        const hls=new Hls({liveSyncDuration:2,liveMaxLatencyDuration:5,maxBufferLength:3,maxMaxBufferLength:5,startLevel:-1,capLevelToPlayerSize:true});
        hls.loadSource(hlsUrl);hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>{vid.play().catch(()=>{});});
        hls.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){hls.destroy();delete hlsPlayers[key];}});
        hlsPlayers[key]=hls;
      }else if(vid.canPlayType('application/vnd.apple.mpegurl')){vid.src=hlsUrl;vid.play().catch(()=>{});}
    }

    function copyUrl(btn,text){navigator.clipboard.writeText(text);btn.textContent='✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},2000);}

    // === FIELD REPORTERS (VDO.Ninja WebRTC) ===
    const VDO_ROOM = 'vxdlive';
    const VDO_PASS = 'vxd2026';
    let reporters = JSON.parse(localStorage.getItem('vxd_reporters')||'[]');

    function renderReporters(){
      // Sidebar list
      const el=document.getElementById('frSlots');
      if(reporters.length===0){el.innerHTML='<div style="color:var(--t3);font-size:11px;text-align:center;padding:8px">No reporters yet</div>';} 
      else{
        el.innerHTML=reporters.map((r,i)=>{
          const brandedUrl=`${window.location.origin}/go?id=${r.id}&name=${encodeURIComponent(r.name)}`;
          return `<div class="fr-slot"><div class="fr-slot-hdr"><span class="fr-slot-name">${r.name}</span><button class="fr-slot-rm" onclick="removeReporter(${i})" title="Remove">✕</button></div><div class="fr-url-box"><span class="fr-url-text">${brandedUrl}</span><button class="fr-share" onclick="shareLink('${brandedUrl}','${r.name}')">Share</button><button class="fr-copy" onclick="copyFr(this,'${brandedUrl}')">Copy</button></div></div>`;
        }).join('');
      }

      // Main area feed cards
      const grid=document.getElementById('reporterFeeds');
      grid.innerHTML=reporters.map(r=>{
        const viewUrl=`https://vdo.ninja/?scene&room=${VDO_ROOM}&password=${VDO_PASS}&codec=h264&buffer=0&streamid=${r.id}&autojoin&autoplay&muted`;
        const vmixViewUrl=`https://vdo.ninja/?scene&room=${VDO_ROOM}&password=${VDO_PASS}&codec=h264&buffer=0&streamid=${r.id}`;
        const brandedUrl=`${window.location.origin}/go?id=${r.id}&name=${encodeURIComponent(r.name)}`;
        return `
          <div class="feed-card" id="rcard-${r.id}">
            <div class="feed-header">
              <div class="feed-left">
                <span class="feed-name">${r.name}</span>
                <span class="feed-key" style="color:var(--blu)">WebRTC</span>
              </div>
            </div>
            <div class="feed-video">
              <iframe id="rvid-${r.id}" src="${viewUrl}" allow="autoplay;camera;microphone" style="width:100%;height:100%;border:none;background:#000"></iframe>
            </div>
            <div class="feed-urls">
              <div class="feed-url-row">
                <span class="feed-url-label">SHARE LINK (send to reporter)</span>
                <div class="feed-url-box">
                  <span class="feed-url-text">${brandedUrl}</span>
                  <button class="fr-share" onclick="shareLink('${brandedUrl}','${r.name}')">Share</button>
                  <button class="copy-btn" onclick="copyUrl(this,'${brandedUrl}')">Copy</button>
                </div>
              </div>
              <div class="feed-url-row">
                <span class="feed-url-label">vMix INPUT (Web Browser → 1920x1080)</span>
                <div class="feed-url-box">
                  <span class="feed-url-text">${vmixViewUrl}</span>
                  <button class="copy-btn" onclick="copyUrl(this,\`${vmixViewUrl}\`)">Copy</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addReporter(){
      const name=document.getElementById('frName').value.trim();
      if(!name)return;
      const id='vxd'+Date.now().toString(36);
      reporters.push({name,id});
      localStorage.setItem('vxd_reporters',JSON.stringify(reporters));
      document.getElementById('frName').value='';
      renderReporters();
    }

    function removeReporter(i){
      if(!confirm('Remove '+reporters[i].name+'?'))return;
      reporters.splice(i,1);
      localStorage.setItem('vxd_reporters',JSON.stringify(reporters));
      renderReporters();
    }

    function shareLink(url,name){
      if(navigator.share){
        navigator.share({title:'VxD Live — '+name,text:'Open this link to go live as '+name,url:url}).catch(()=>{});
      }else{
        navigator.clipboard.writeText(url);
        alert('Link copied! Share it with '+name);
      }
    }

    function copyFr(btn,text){navigator.clipboard.writeText(text);btn.textContent='✓';btn.classList.add('ok');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok');},2000);}

    renderReporters();

    render();
    renderFeeds();
  </script>
</body>
</html>
