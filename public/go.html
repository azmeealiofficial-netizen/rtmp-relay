<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>VxD Live</title>
  <style>
    @font-face{font-family:'MVWaheed';src:url('fonts/MVWaheed.otf') format('opentype')}
    @font-face{font-family:'MvEamaan';src:url('fonts/Mv_Eamaan_XP.otf') format('opentype')}
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',system-ui,-apple-system,sans-serif;color:#fff;touch-action:manipulation}

    /* Landscape hint */
    .rotate-msg{display:none;position:fixed;inset:0;background:#0a0a0f;z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .rotate-msg .icon{font-size:48px;opacity:.6}
    .rotate-msg .text{font-family:'MvEamaan',sans-serif;font-size:22px;color:#ccc;direction:rtl;text-align:center;padding:0 32px}
    .rotate-msg .logos{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .rotate-msg .logos img{height:36px;object-fit:contain}
    .rotate-msg .logos span{color:#555;font-size:14px}
    @media(orientation:portrait){.rotate-msg{display:flex}}

    .app{position:fixed;inset:0;background:#000}

    .vdo-frame{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:1;display:none}

    /* Idle screen */
    .idle{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f}
    .idle.hidden{display:none}
    .brand{display:flex;align-items:center;gap:14px;margin-bottom:12px}
    .brand img{height:44px;object-fit:contain}
    .brand-x{color:#555;font-size:16px;font-weight:300}
    .reporter-name{font-size:20px;font-weight:700;color:#fafafa;margin-bottom:4px}
    .reporter-tag{color:#FF6B1A;font-size:11px;font-weight:600;letter-spacing:2px;margin-bottom:36px}

    .go-btn{
      width:130px;height:130px;border-radius:50%;border:3px solid #22c55e;
      background:radial-gradient(circle,#22c55e,#16a34a);
      color:#fff;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;
      box-shadow:0 0 40px #22c55e33;transition:all .2s;
    }
    .go-btn:active{transform:scale(0.92)}

    .cam-select{margin-top:20px;display:flex;gap:8px}
    .cam-opt{padding:8px 20px;border-radius:20px;border:1px solid #333;background:transparent;color:#888;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
    .cam-opt.act{border-color:#FF6B1A;color:#FF6B1A;background:rgba(255,107,26,0.08)}

    .idle-tips{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#333;font-size:10px}

    /* Live overlay */
    .live-overlay{position:absolute;inset:0;z-index:20;display:none;pointer-events:none}
    .live-overlay.active{display:block}

    .live-top{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,transparent 100%);pointer-events:auto}
    .live-badge-bar{display:flex;align-items:center;gap:8px}
    .live-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pd 1.5s infinite}
    @keyframes pd{0%,100%{opacity:1;box-shadow:0 0 6px #ef4444}50%{opacity:.4}}
    .live-text{font-size:12px;font-weight:800;color:#ef4444;letter-spacing:2px}
    .live-timer{font-size:11px;color:#aaa;font-weight:600;font-variant-numeric:tabular-nums}
    .live-brand{display:flex;align-items:center;gap:6px}
    .live-brand img{height:22px;object-fit:contain}
    .live-brand span{color:#555;font-size:11px}

    .live-bottom{position:absolute;bottom:0;left:0;right:0;padding:14px;display:flex;justify-content:center;background:linear-gradient(0deg,rgba(0,0,0,.65) 0%,transparent 100%);pointer-events:auto}
    .end-btn{padding:10px 36px;border-radius:24px;border:none;background:#ef4444;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:1px}
    .end-btn:active{transform:scale(0.95)}

    /* SOS */
    .sos-btn{
      position:absolute;top:12px;left:14px;
      width:44px;height:44px;border-radius:50%;
      background:rgba(239,68,68,0.2);border:2px solid rgba(239,68,68,0.5);
      color:#fff;font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      pointer-events:auto;backdrop-filter:blur(4px);transition:all .15s;
      z-index:25;
    }
    .sos-btn:active{transform:scale(0.9)}

    .sos-panel{
      position:absolute;top:60px;left:14px;
      background:rgba(10,10,15,0.95);border:1px solid rgba(239,68,68,0.3);
      border-radius:12px;padding:12px;width:220px;
      display:flex;flex-direction:column;gap:6px;
      pointer-events:auto;backdrop-filter:blur(10px);
      z-index:25;animation:fadeIn .2s ease;
    }
    .sos-panel.hidden{display:none}
    .sos-title{font-size:12px;font-weight:800;color:#ef4444;letter-spacing:2px;text-align:center;margin-bottom:4px}
    .sos-msg{
      border:1px solid rgba(255,255,255,0.1);border-radius:8px;
      padding:10px 12px;background:rgba(255,255,255,0.05);
      color:#fff;font-size:14px;cursor:pointer;text-align:right;
      direction:rtl;font-family:'MvEamaan','Inter',sans-serif;
      transition:all .15s;
    }
    .sos-msg:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
    .sos-msg:active{transform:scale(0.97)}
    .sos-close{
      border:none;border-radius:8px;padding:8px;
      background:rgba(255,255,255,0.08);color:#888;
      font-size:12px;cursor:pointer;font-family:inherit;
      margin-top:2px;
    }

    .sos-sent{
      position:absolute;top:14px;left:70px;
      background:#22c55e;color:#fff;
      padding:6px 16px;border-radius:20px;
      font-size:12px;font-weight:700;
      pointer-events:none;z-index:25;
      animation:fadeIn .2s ease;
    }
    .sos-sent.hidden{display:none}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

    /* Control-room message prompt */
    #vxd-prompt{position:absolute;left:14px;right:14px;bottom:16px;z-index:9999;
      background:#1c2026;border:1px solid rgba(245,158,11,.55);border-radius:14px;
      padding:14px;transform:translateY(180%);transition:transform .28s ease;
      box-shadow:0 8px 28px rgba(0,0,0,.5);pointer-events:auto}
    #vxd-prompt.show{transform:translateY(0)}
    #vxd-prompt .vxd-from{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;
      letter-spacing:1px;color:#f59e0b;margin-bottom:8px}
    #vxd-prompt .vxd-text{color:#fff;font-size:18px;line-height:1.4;margin:0 0 14px;
      font-family:'MvEamaan','Inter',sans-serif}
    #vxd-prompt .vxd-btns{display:flex;gap:10px}
    #vxd-prompt button{flex:1;border:none;border-radius:10px;padding:14px;cursor:pointer;
      font-size:22px;line-height:1;color:#fff;font-family:inherit}
    #vxd-yes{background:#16a34a}
    #vxd-yes:active{background:#15803d;transform:scale(.97)}
    #vxd-no{background:#3a2020;color:#f09595;border:1px solid rgba(239,68,68,.5)!important}
    #vxd-no:active{background:#4a2626;transform:scale(.97)}
    #vxd-toast{position:absolute;left:50%;top:16px;transform:translate(-50%,-180%);z-index:9999;
      background:rgba(0,0,0,.82);color:#fff;font-size:13px;font-weight:600;padding:8px 16px;
      border-radius:999px;transition:transform .25s ease;pointer-events:none}
    #vxd-toast.show{transform:translate(-50%,0)}

    /* End screen */
    .ended{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f}
    .ended.active{display:flex}
    .ended-icon{font-size:40px;margin-bottom:10px;opacity:.4}
    .ended-text{font-size:16px;font-weight:700;margin-bottom:4px}
    .ended-sub{font-size:12px;color:#666;margin-bottom:20px}
    .restart-btn{padding:10px 24px;border-radius:8px;border:none;background:#22c55e;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>
  <div class="rotate-msg">
    <div class="logos">
      <img src="img/voice.png" alt="VOICE">
      <span>✕</span>
      <img src="img/dhuvas.png" alt="DHUVAS">
    </div>
    <div class="icon">📱↔️</div>
    <div class="text">ލައިވް ކުރަން ފެށުމަށް ފޯނު އަނބުރާލާ</div>
  </div>

  <div class="app">
    <iframe id="vdoFrame" class="vdo-frame" allow="camera;microphone;autoplay;display-capture"></iframe>

    <div class="idle" id="idleScreen">
      <div class="brand">
        <img src="img/voice.png" alt="VOICE">
        <span class="brand-x">✕</span>
        <img src="img/dhuvas.png" alt="DHUVAS">
      </div>
      <div class="reporter-name" id="reporterName">Reporter</div>
      <div class="reporter-tag">FIELD REPORTER</div>
      <button class="go-btn" onclick="startLive()">GO LIVE</button>
      <div class="cam-select">
        <button class="cam-opt act" id="camBack" onclick="setCam('back')">Back Camera</button>
        <button class="cam-opt" id="camFront" onclick="setCam('front')">Front Camera</button>
      </div>
      <div class="idle-tips">Allow camera & mic when asked • Use WiFi for best quality</div>
    </div>

    <div class="live-overlay" id="liveOverlay">
      <div class="live-top">
        <div class="live-badge-bar">
          <span class="live-dot"></span>
          <span class="live-text">LIVE</span>
          <span class="live-timer" id="liveTimer">00:00</span>
        </div>
        <div class="live-brand">
          <img src="img/voice.png" alt="VOICE">
          <span>✕</span>
          <img src="img/dhuvas.png" alt="DHUVAS">
        </div>
      </div>
      <div class="live-bottom">
        <button class="end-btn" onclick="endLive()">END STREAM</button>
      </div>
      <button class="sos-btn" id="sosBtn" onclick="toggleSos()">⚠️</button>
      <div class="sos-panel hidden" id="sosPanel">
        <div class="sos-title">SOS</div>
        <button class="sos-msg" onclick="sendSos('ބެޓެރީ ހުސްވަނީ','Battery Low')">🔋 ބެޓެރީ ހުސްވަނީ</button>
        <button class="sos-msg" onclick="sendSos('ޑާޓާ ލޯ','Data Low')">📶 ޑާޓާ ލޯ</button>
        <button class="sos-msg" onclick="sendSos('ބެކަޕް ބޭނުން','Need Backup')">🆘 ބެކަޕް ބޭނުން</button>
        <button class="sos-msg" onclick="sendSos('ފެން ބޭނުން','Water')">💧 ފެން ބޭނުން</button>
        <button class="sos-msg" onclick="sendSos('ހޮސްޕިޓަލަށް ގެންދޭ','Emergency')">🚨 ހޮސްޕިޓަލަށް ގެންދޭ</button>
        <button class="sos-close" onclick="toggleSos()">✕ Close</button>
      </div>
      <div class="sos-sent hidden" id="sosSent">✓ Sent!</div>
    </div>

    <!-- Control room message prompt -->
    <div id="vxd-prompt" role="alertdialog" aria-live="assertive">
      <div class="vxd-from"><span>📡</span><span>FROM CONTROL ROOM</span></div>
      <p class="vxd-text" id="vxd-text"></p>
      <div class="vxd-btns">
        <button id="vxd-yes" aria-label="Accept">✓</button>
        <button id="vxd-no" aria-label="Ignore">✕</button>
      </div>
    </div>
    <div id="vxd-toast"></div>

    <div class="ended" id="endedScreen">
      <div class="ended-icon">✓</div>
      <div class="ended-text">Stream Ended</div>
      <div class="ended-sub" id="endedDuration">Duration: 00:00</div>
      <button class="restart-btn" onclick="restart()">Go Live Again</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const streamId = params.get('id') || 'reporter';
    const reporterName = decodeURIComponent(params.get('name') || 'Reporter');
    const room = 'vxdlive';
    const password = 'vxd2026';

    document.getElementById('reporterName').textContent = reporterName;
    document.title = 'VxD Live — ' + reporterName;

    let timerInterval = null;
    let startTime = null;
    let selectedCam = 'environment'; // back camera default

    function setCam(type) {
      if (type === 'back') {
        selectedCam = 'environment';
        document.getElementById('camBack').classList.add('act');
        document.getElementById('camFront').classList.remove('act');
      } else {
        selectedCam = 'user';
        document.getElementById('camFront').classList.add('act');
        document.getElementById('camBack').classList.remove('act');
      }
    }

    // Default to back camera
    setCam('back');

    function startLive() {
      const frame = document.getElementById('vdoFrame');
      const idle = document.getElementById('idleScreen');
      const overlay = document.getElementById('liveOverlay');

      const vdoUrl = `https://live.vxd.news/?push=${streamId}&room=${room}&password=${password}&quality=1&codec=h264&label=${encodeURIComponent(reporterName)}&webcam&facingmode=${selectedCam}&width=1280&height=720&autostart&noaudio=0&cleanoutput&cleanviewer&api=${password}`;

      frame.src = vdoUrl;
      frame.style.display = 'block';

      setTimeout(() => {
        idle.classList.add('hidden');
        overlay.classList.add('active');
        startTimer();
      }, 2500);
    }

    function endLive() {
      if (!confirm('End the live stream?')) return;
      const frame = document.getElementById('vdoFrame');
      const overlay = document.getElementById('liveOverlay');
      const ended = document.getElementById('endedScreen');

      frame.src = '';
      frame.style.display = 'none';
      overlay.classList.remove('active');
      ended.classList.add('active');
      stopTimer();
      document.getElementById('endedDuration').textContent = 'Duration: ' + document.getElementById('liveTimer').textContent;
    }

    function restart() {
      document.getElementById('endedScreen').classList.remove('active');
      document.getElementById('idleScreen').classList.remove('hidden');
      document.getElementById('liveTimer').textContent = '00:00';
    }

    function startTimer() {
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        document.getElementById('liveTimer').textContent = m + ':' + s;
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) clearInterval(timerInterval);
    }

    // Prevent sleep
    async function requestWakeLock() {
      try { await navigator.wakeLock.request('screen'); } catch (e) {}
    }
    requestWakeLock();
    try { screen.orientation.lock('landscape').catch(() => {}); } catch (e) {}

    // SOS
    function toggleSos() {
      document.getElementById('sosPanel').classList.toggle('hidden');
    }

    async function sendSos(msgDv, msgEn) {
      try {
        await fetch('/api/sos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            reporter: reporterName,
            reporterId: streamId,
            message: msgDv,
            messageEn: msgEn,
            time: new Date().toISOString()
          })
        });
      } catch(e) {}
      document.getElementById('sosPanel').classList.add('hidden');
      const sent = document.getElementById('sosSent');
      sent.classList.remove('hidden');
      setTimeout(() => sent.classList.add('hidden'), 2000);
    }
    // === CONTROL-ROOM MESSAGES ===
    function restartPushWithCam(cam) {
      selectedCam = cam === 'front' ? 'user' : 'environment';
      const frame = document.getElementById('vdoFrame');
      const vdoUrl = `https://live.vxd.news/?push=${streamId}&room=${room}&password=${password}&quality=1&codec=h264&label=${encodeURIComponent(reporterName)}&webcam&facingmode=${selectedCam}&width=1280&height=720&autostart&noaudio=0&cleanoutput&cleanviewer&api=${password}`;
      frame.src = '';
      setTimeout(() => { frame.src = vdoUrl; }, 500);
    }

    function applyCommsAction(action) {
      try {
        if (action === 'front-cam') {
          restartPushWithCam('front');
        } else if (action === 'rear-cam') {
          restartPushWithCam('back');
        } else if (action === 'restart-front') {
          restartPushWithCam('front');
        }
      } catch (e) { console.warn('comms action failed', e); }
    }

    (function () {
      const prompt = document.getElementById('vxd-prompt');
      const textEl = document.getElementById('vxd-text');
      const toast  = document.getElementById('vxd-toast');
      let current = null;
      const handled = new Set();

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      }
      function show(m) {
        current = m;
        textEl.textContent = m.text;
        prompt.classList.add('show');
        try { navigator.vibrate && navigator.vibrate([120, 60, 120]); } catch (e) {}
      }
      function hide() { prompt.classList.remove('show'); current = null; }

      async function reply(response) {
        if (!current) return;
        const m = current;
        handled.add(m.msgId);
        hide();
        try {
          await fetch('/api/msg/ack', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: streamId, msgId: m.msgId, response })
          });
        } catch (e) {}
        if (response === 'yes') {
          showToast('Got it ✓');
          if (m.action) applyCommsAction(m.action);
        }
      }

      document.getElementById('vxd-yes').onclick = () => reply('yes');
      document.getElementById('vxd-no').onclick  = () => reply('ignore');

      async function poll() {
        try {
          const r = await fetch('/api/msg/poll?id=' + encodeURIComponent(streamId), { cache: 'no-store' });
          const j = await r.json();
          const m = j.msg;
          if (m && m.status === 'pending'
                && !handled.has(m.msgId)
                && (Date.now() - m.sentAt) < 120000
                && (!current || current.msgId !== m.msgId)) {
            show(m);
          }
        } catch (e) {}
      }
      setInterval(poll, 2000);
      poll();
    })();
  </script>
</body>
</html>
