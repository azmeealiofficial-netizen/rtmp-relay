<!DOCTYPE html>
<html dir="rtl" lang="dv">
<head>
<meta charset="UTF-8">
<style>
  @font-face{font-family:'MVWaheed';src:url('fonts/MVWaheed.otf') format('opentype')}
  @font-face{font-family:'MvEamaan';src:url('fonts/Mv_Eamaan_XP.otf') format('opentype')}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:transparent;overflow:hidden;width:1920px;height:1080px}

  .ticker-wrap{
    position:absolute;bottom:0;left:0;right:0;
    display:flex;flex-direction:column;
    transition:opacity .5s ease,transform .4s ease;
    transform:translateY(0);
  }
  .ticker-wrap.hidden{opacity:0;transform:translateY(100%);pointer-events:none}

  .ticker-stripe{height:5px;background:linear-gradient(90deg,#ef4444 30%,#f59e0b 100%)}

  .ticker-bar{height:88px;display:flex;align-items:center;direction:rtl}

  .ticker-label{
    background:#ef4444;color:#fff;
    font-family:'MVWaheed','Segoe UI',Arial,sans-serif;
    font-size:36px;
    padding:0 40px;height:100%;
    display:flex;align-items:center;
    white-space:nowrap;direction:rtl;
    min-width:220px;justify-content:center;
  }

  .ticker-body{
    background:#0f0f1aee;flex:1;height:100%;
    display:flex;align-items:center;
    overflow:hidden;direction:rtl;
    border-left:5px solid #f59e0b;
  }

  .ticker-text{
    display:inline-block;white-space:nowrap;
    font-family:'MvEamaan','Segoe UI',Arial,sans-serif;
    font-size:38px;color:#fff;
    line-height:88px;
    animation:scroll-rtl linear infinite;
    padding-right:100%;
  }

  @keyframes scroll-rtl{
    0%{transform:translateX(0)}
    100%{transform:translateX(100%)}
  }

  .ticker-text.static{animation:none;padding-right:40px;width:100%}

  .ticker-wrap.ltr .ticker-bar{direction:ltr}
  .ticker-wrap.ltr .ticker-label{direction:ltr;font-family:'Segoe UI',Arial,sans-serif;font-weight:800;font-size:32px}
  .ticker-wrap.ltr .ticker-body{direction:ltr;border-left:none;border-right:5px solid #f59e0b}
  .ticker-wrap.ltr .ticker-text{
    font-family:'Segoe UI',Arial,sans-serif;
    padding-right:0;padding-left:100%;
    animation-name:scroll-ltr;
  }
  .ticker-wrap.ltr .ticker-text.static{padding-left:40px;padding-right:0}
  .ticker-wrap.ltr .ticker-stripe{background:linear-gradient(270deg,#ef4444 30%,#f59e0b 100%)}

  @keyframes scroll-ltr{
    0%{transform:translateX(0)}
    100%{transform:translateX(-100%)}
  }
</style>
</head>
<body>
  <div class="ticker-wrap hidden" id="tickerWrap">
    <div class="ticker-stripe" id="tickerStripe"></div>
    <div class="ticker-bar">
      <div class="ticker-label" id="tickerLabel">ބްރޭކިންގ</div>
      <div class="ticker-body">
        <span class="ticker-text" id="tickerText"></span>
      </div>
    </div>
  </div>

  <script>
    const params=new URLSearchParams(window.location.search);
    const TICKER_ID=params.get('id')||'voice';
    const API_URL=window.location.origin+'/api/ticker/'+TICKER_ID;
    let current={};

    async function pollTicker(){
      try{
        const r=await fetch(API_URL+'?t='+Date.now());
        if(!r.ok)return;
        const data=await r.json();
        const key=JSON.stringify(data);
        if(key===JSON.stringify(current))return;
        current=data;

        const wrap=document.getElementById('tickerWrap');
        const label=document.getElementById('tickerLabel');
        const text=document.getElementById('tickerText');
        const stripe=document.getElementById('tickerStripe');

        const isLtr=data.direction==='ltr';
        wrap.className='ticker-wrap'+(data.visible?'':' hidden')+(isLtr?' ltr':'');

        label.textContent=data.label||'ބްރޭކިންގ';

        const lc=data.labelColor||'#ef4444';
        label.style.background=lc;

        if(isLtr){stripe.style.background=`linear-gradient(270deg,${lc} 30%,#f59e0b 100%)`;}
        else{stripe.style.background=`linear-gradient(90deg,${lc} 30%,#f59e0b 100%)`;}

        text.textContent=data.text||'';

        if(data.mode==='static'){
          text.className='ticker-text static';
        }else{
          text.className='ticker-text';
          const speed=data.speed||15;
          const duration=Math.max(8,(data.text||'').length/speed*10);
          text.style.animationDuration=duration+'s';
        }
      }catch(e){}
    }

    pollTicker();
    setInterval(pollTicker,1000);
  </script>
</body>
</html>
