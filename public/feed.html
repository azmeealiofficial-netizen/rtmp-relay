<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VxD Feed</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:#000}
  .layer{position:absolute;inset:0;width:100%;height:100%;border:none}
  #tag{pointer-events:none;background:transparent}   /* transparent reporter-tag overlay on top */
</style>
</head>
<body>
  <!-- Reporter WebRTC scene (VDO.Ninja) underneath -->
  <iframe class="layer" id="scene" allow="autoplay; fullscreen" allowfullscreen></iframe>
  <!-- Reporter tag overlay on top — same /reporter-tag page, shows bottom-right when toggled ON -->
  <iframe class="layer" id="tag"></iframe>

  <script>
    var params = new URLSearchParams(location.search);
    var ID     = params.get('id') || '';
    var MUTED  = params.get('muted') === '1';   // muted for in-page previews; unmuted for vMix

    var VDO_ROOM = 'vxdlive';
    var VDO_PASS = 'vxd2026';

    var scene = 'https://live.vxd.news/?scene&room=' + VDO_ROOM + '&password=' + VDO_PASS
              + '&codec=h264&buffer=0&streamid=' + encodeURIComponent(ID) + '&autoplay&cleanoutput'
              + (MUTED ? '&muted' : '');

    document.getElementById('scene').src = scene;
    document.getElementById('tag').src   = '/reporter-tag?id=' + encodeURIComponent(ID);
  </script>
</body>
</html>
